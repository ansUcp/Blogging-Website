name: Pull Request Validation

on:
  pull_request:
    branches:
      - develop

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install

      - name: Lint HTML Files
        run: npx htmlhint "src/**/*.html"

      - name: Lint CSS Files
        run: npx stylelint "styles/**/*.css"

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install parcel-bundler --save-dev

      - name: Build Project
        run: npx parcel build src/home.html src/blog.html src/contact.html