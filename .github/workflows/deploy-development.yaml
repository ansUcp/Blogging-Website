name: Deploy to GitHub Pages

on:
  push:
    branches:
      - develop

permissions:
  id-token: write
  pages: write
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: npm install parcel-bundler --save-dev

      - name: Build Project
        run: npx parcel build src/home.html src/blog.html src/contact.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
    
    environment:
      name: github-pages    